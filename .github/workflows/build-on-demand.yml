name: Build on demand
on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Chế độ chạy: incremental | full | two_phase'
        required: false
        default: 'incremental'
      upload_images:
        description: 'Sau khi build xong thì ghi ảnh thumb/poster vào repo (public/) (true/false)'
        required: false
        default: 'false'
      reupload_existing:
        description: 'Upload lại ảnh đã upload (bỏ qua repo_image_upload_state.json) (true/false)'
        required: false
        default: 'false'
      start_page:
        description: 'Trang bắt đầu (OPhim), 0 = mặc định'
        required: false
        default: '0'
      end_page:
        description: 'Trang kết thúc (OPhim), 0 = không giới hạn'
        required: false
        default: '0'
      clean:
        description: 'Xóa dữ liệu cũ trước khi build (true/false)'
        required: false
        default: 'false'
  repository_dispatch:
    types: [build-on-demand]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm install

      - name: Load OPhim env from Supabase (auto settings)
        run: node scripts/load-ophim-env-from-supabase.js
        env:
          SUPABASE_ADMIN_URL: ${{ secrets.SUPABASE_ADMIN_URL }}
          SUPABASE_ADMIN_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_ADMIN_SERVICE_ROLE_KEY }}

      - name: Resolve inputs (workflow_dispatch or repository_dispatch)
        run: |
          MODE_INPUT="${{ inputs.mode }}"
          if [ -z "$MODE_INPUT" ] || [ "$MODE_INPUT" = "" ]; then
            MODE_INPUT="${{ github.event.client_payload.mode }}"
          fi
          if [ -z "$MODE_INPUT" ] || [ "$MODE_INPUT" = "" ]; then
            MODE_INPUT="incremental"
          fi
          echo "BUILD_MODE=$MODE_INPUT" >> $GITHUB_ENV

          UPLOAD_INPUT="${{ inputs.upload_images }}"
          if [ -z "$UPLOAD_INPUT" ] || [ "$UPLOAD_INPUT" = "" ]; then
            UPLOAD_INPUT="${{ github.event.client_payload.upload_images }}"
          fi
          if [ -z "$UPLOAD_INPUT" ] || [ "$UPLOAD_INPUT" = "" ]; then
            UPLOAD_INPUT="false"
          fi
          echo "UPLOAD_IMAGES=$UPLOAD_INPUT" >> $GITHUB_ENV

          CLEAN_INPUT="${{ inputs.clean }}"
          if [ -z "$CLEAN_INPUT" ] || [ "$CLEAN_INPUT" = "" ]; then
            CLEAN_INPUT="${{ github.event.client_payload.clean }}"
          fi
          if [ -z "$CLEAN_INPUT" ] || [ "$CLEAN_INPUT" = "" ]; then
            CLEAN_INPUT="false"
          fi
          if [ "$CLEAN_INPUT" = "true" ]; then
            echo "CLEAN_OLD_DATA=1" >> $GITHUB_ENV
          else
            echo "CLEAN_OLD_DATA=0" >> $GITHUB_ENV
          fi

          START_INPUT="${{ inputs.start_page }}"
          if [ -z "$START_INPUT" ] || [ "$START_INPUT" = "" ]; then
            START_INPUT="${{ github.event.client_payload.start_page }}"
          fi
          if [ -z "$START_INPUT" ] || [ "$START_INPUT" = "" ] || [ "$START_INPUT" = "0" ]; then
            START_INPUT="${{ vars.OPHIM_START_PAGE || '1' }}"
          fi
          echo "OPHIM_START_PAGE=$START_INPUT" >> $GITHUB_ENV

          END_INPUT="${{ inputs.end_page }}"
          if [ -z "$END_INPUT" ] || [ "$END_INPUT" = "" ]; then
            END_INPUT="${{ github.event.client_payload.end_page }}"
          fi
          if [ -z "$END_INPUT" ] || [ "$END_INPUT" = "" ] || [ "$END_INPUT" = "0" ]; then
            END_INPUT="${{ vars.OPHIM_END_PAGE || '0' }}"
          fi
          echo "OPHIM_END_PAGE=$END_INPUT" >> $GITHUB_ENV

      - name: Build (incremental)
        if: ${{ env.BUILD_MODE == 'incremental' }}
        run: npm run build -- --incremental
        env:
          OPHIM_BASE_URL: ${{ secrets.OPHIM_BASE_URL || 'https://ophim1.com/v1/api' }}
          OPHIM_FETCH_TIMEOUT_MS: ${{ vars.OPHIM_FETCH_TIMEOUT_MS || '25000' }}
          OPHIM_START_PAGE: ${{ env.OPHIM_START_PAGE }}
          OPHIM_END_PAGE: ${{ env.OPHIM_END_PAGE }}
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          SUPABASE_ADMIN_URL: ${{ secrets.SUPABASE_ADMIN_URL }}
          SUPABASE_ADMIN_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_ADMIN_SERVICE_ROLE_KEY }}
          IMAGE_CDN_BASE: ${{ secrets.IMAGE_CDN_BASE }}

      - name: Build (full)
        if: ${{ env.BUILD_MODE == 'full' }}
        run: npm run build
        env:
          CLEAN_OLD_DATA: ${{ env.CLEAN_OLD_DATA }}
          OPHIM_BASE_URL: ${{ secrets.OPHIM_BASE_URL || 'https://ophim1.com/v1/api' }}
          OPHIM_FETCH_TIMEOUT_MS: ${{ vars.OPHIM_FETCH_TIMEOUT_MS || '25000' }}
          OPHIM_START_PAGE: ${{ env.OPHIM_START_PAGE }}
          OPHIM_END_PAGE: ${{ env.OPHIM_END_PAGE }}
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          SUPABASE_ADMIN_URL: ${{ secrets.SUPABASE_ADMIN_URL }}
          SUPABASE_ADMIN_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_ADMIN_SERVICE_ROLE_KEY }}
          IMAGE_CDN_BASE: ${{ secrets.IMAGE_CDN_BASE }}

      - name: Build CORE (two_phase)
        if: ${{ env.BUILD_MODE == 'two_phase' }}
        run: npm run build
        env:
          CLEAN_OLD_DATA: ${{ env.CLEAN_OLD_DATA }}
          SKIP_TMDB: '1'
          OPHIM_BASE_URL: ${{ secrets.OPHIM_BASE_URL || 'https://ophim1.com/v1/api' }}
          OPHIM_FETCH_TIMEOUT_MS: ${{ vars.OPHIM_FETCH_TIMEOUT_MS || '25000' }}
          OPHIM_START_PAGE: ${{ env.OPHIM_START_PAGE }}
          OPHIM_END_PAGE: ${{ env.OPHIM_END_PAGE }}
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          SUPABASE_ADMIN_URL: ${{ secrets.SUPABASE_ADMIN_URL }}
          SUPABASE_ADMIN_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_ADMIN_SERVICE_ROLE_KEY }}
          IMAGE_CDN_BASE: ${{ secrets.IMAGE_CDN_BASE }}

      - name: Build TMDB ONLY (two_phase)
        if: ${{ env.BUILD_MODE == 'two_phase' }}
        run: npm run build
        env:
          CLEAN_OLD_DATA: '0'
          TMDB_ONLY: '1'
          OPHIM_BASE_URL: ${{ secrets.OPHIM_BASE_URL || 'https://ophim1.com/v1/api' }}
          OPHIM_FETCH_TIMEOUT_MS: ${{ vars.OPHIM_FETCH_TIMEOUT_MS || '25000' }}
          OPHIM_START_PAGE: ${{ env.OPHIM_START_PAGE }}
          OPHIM_END_PAGE: ${{ env.OPHIM_END_PAGE }}
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          SUPABASE_ADMIN_URL: ${{ secrets.SUPABASE_ADMIN_URL }}
          SUPABASE_ADMIN_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_ADMIN_SERVICE_ROLE_KEY }}
          IMAGE_CDN_BASE: ${{ secrets.IMAGE_CDN_BASE }}

      - name: Upload movie images to repo (after build)
        if: ${{ env.UPLOAD_IMAGES == 'true' }}
        run: |
          node scripts/upload-movie-images-repo.js \
            --reupload_existing "${{ inputs.reupload_existing }}"
        env:
          IMAGE_CDN_BASE: ${{ secrets.IMAGE_CDN_BASE }}
          REPO_IMAGE_REUPLOAD_EXISTING: ${{ inputs.reupload_existing }}

      - name: Push movie images to assets GitHub repo
        if: ${{ env.UPLOAD_IMAGES == 'true' && secrets.IMAGES_REPO != '' }}
        run: node scripts/push-images-to-assets-repo.js
        env:
          IMAGES_REPO: ${{ secrets.IMAGES_REPO }}
          IMAGES_TOKEN: ${{ secrets.IMAGES_TOKEN || secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          IMAGES_BRANCH: ${{ secrets.IMAGES_BRANCH }}

      - name: Commit and push
        env:
          GIT_ADD_PUBLIC_IMAGES: ${{ secrets.IMAGES_REPO != '' && '' || 'public/thumbs public/posters' }}
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add public/data $GIT_ADD_PUBLIC_IMAGES public/the-loai public/quoc-gia public/nam-phat-hanh public/_redirects public/_routes.json
          find public -type f -name '*.html' -print0 | xargs -0 -r git add --
          git status
          if git diff --staged --quiet; then
            echo "No changes — không có gì để push."
          else
            git commit -m "chore: build on demand (${BUILD_MODE})" && git push
          fi
