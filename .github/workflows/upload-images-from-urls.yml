name: Upload repo images from URLs

on:
  workflow_dispatch:
    inputs:
      folder:
        description: "Target folder: thumbs | posters"
        required: false
        default: "thumbs"
      pairs:
        description: "Optional: name|url pairs (newline separated). If provided, ids/urls will be ignored. name is output filename (e.g. 123.webp)."
        required: false
        default: ""
      ids:
        description: "Movie IDs (newline separated). Must align with urls order."
        required: false
        default: ""
      urls:
        description: "Source image URLs (newline separated). Must align with ids order."
        required: false
        default: ""
      quality:
        description: "WebP quality (1-100)"
        required: false
        default: "70"
      width:
        description: "Resize width (0 = keep)"
        required: false
        default: "0"
      height:
        description: "Resize height (0 = keep)"
        required: false
        default: "0"
      limit:
        description: "Limit (0 = no limit)"
        required: false
        default: "0"
      concurrency:
        description: "Concurrency (1-16)"
        required: false
        default: "6"

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download + write public/<folder>
        run: |
          node scripts/upload-images-from-urls.js \
            --folder "${{ inputs.folder }}" \
            --pairs "${{ inputs.pairs }}" \
            --ids "${{ inputs.ids }}" \
            --urls "${{ inputs.urls }}" \
            --quality "${{ inputs.quality }}" \
            --width "${{ inputs.width }}" \
            --height "${{ inputs.height }}" \
            --limit "${{ inputs.limit }}" \
            --concurrency "${{ inputs.concurrency }}" \
            --out_log "tmp/repo_upload_from_urls.json"
        env:
          IMAGE_CDN_BASE: ${{ secrets.IMAGE_CDN_BASE }}

      - name: Push movie images to assets GitHub repo
        if: ${{ secrets.IMAGES_REPO != '' }}
        run: node scripts/push-images-to-assets-repo.js
        env:
          IMAGES_REPO: ${{ secrets.IMAGES_REPO }}
          IMAGES_TOKEN: ${{ secrets.IMAGES_TOKEN || secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          IMAGES_BRANCH: ${{ secrets.IMAGES_BRANCH }}

      - name: Commit images
        env:
          GIT_ADD_PUBLIC_ROOT: ${{ secrets.IMAGES_REPO != '' && '' || 'public' }}
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add tmp/repo_upload_from_urls.json $GIT_ADD_PUBLIC_ROOT
          git diff --staged --quiet || (git commit -m "chore: images from urls" && git push)

      - name: Upload log artifact
        uses: actions/upload-artifact@v4
        with:
          name: repo_upload_from_urls_log
          path: tmp/repo_upload_from_urls.json
