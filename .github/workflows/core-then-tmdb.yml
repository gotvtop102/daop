name: Core then TMDB (2-phase deploy)
on:
  workflow_dispatch:
    inputs:
      start_page:
        description: 'Trang bắt đầu (OPhim), 0 = mặc định'
        required: false
        default: '0'
      end_page:
        description: 'Trang kết thúc (OPhim), 0 = không giới hạn'
        required: false
        default: '0'
      clean:
        description: 'Xóa dữ liệu cũ trước khi build core (true/false)'
        required: false
        default: 'false'
      upload_images:
        description: 'Sau khi build xong thì tải/nén/upload ảnh thumb/poster lên R2 (true/false)'
        required: false
        default: 'false'
      reupload_existing:
        description: 'Upload lại ảnh đã upload (bỏ qua r2_upload_state.json) (true/false)'
        required: false
        default: 'false'

jobs:
  build_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm install

      - name: Load OPhim env from Supabase (auto settings)
        run: node scripts/load-ophim-env-from-supabase.js
        env:
          SUPABASE_ADMIN_URL: ${{ secrets.SUPABASE_ADMIN_URL }}
          SUPABASE_ADMIN_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_ADMIN_SERVICE_ROLE_KEY }}

      - name: Build CORE (skip TMDB)
        run: npm run build
        env:
          CLEAN_OLD_DATA: ${{ inputs.clean == 'true' && '1' || '0' }}
          SKIP_TMDB: '1'
          OPHIM_BASE_URL: ${{ secrets.OPHIM_BASE_URL || 'https://ophim1.com/v1/api' }}
          OPHIM_START_PAGE: ${{ inputs.start_page != '0' && inputs.start_page || env.OPHIM_START_PAGE || vars.OPHIM_START_PAGE || '1' }}
          OPHIM_END_PAGE: ${{ inputs.end_page != '0' && inputs.end_page || env.OPHIM_END_PAGE || vars.OPHIM_END_PAGE || '0' }}
          OPHIM_FETCH_TIMEOUT_MS: ${{ vars.OPHIM_FETCH_TIMEOUT_MS || '25000' }}
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          SUPABASE_ADMIN_URL: ${{ secrets.SUPABASE_ADMIN_URL }}
          SUPABASE_ADMIN_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_ADMIN_SERVICE_ROLE_KEY }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}

      - name: Commit & push CORE
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add public/data public/the-loai public/quoc-gia public/nam-phat-hanh public/_redirects public/_routes.json
          find public -type f -name '*.html' -print0 | xargs -0 -r git add --
          git status
          git diff --staged --quiet || (git commit -m "chore: core build (skip tmdb)" && git push)

      - name: Deploy CORE to Cloudflare Pages
        if: ${{ env.DEPLOY_AFTER_R2_UPLOAD != '1' || inputs.upload_images != 'true' }}
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: '4.77.0'
          command: pages deploy public --project-name=${{ vars.CLOUDFLARE_PAGES_PROJECT_NAME || 'daop' }} --commit-dirty=true

      - name: Build TMDB ONLY
        run: npm run build
        env:
          CLEAN_OLD_DATA: '0'
          TMDB_ONLY: '1'
          OPHIM_BASE_URL: ${{ secrets.OPHIM_BASE_URL || 'https://ophim1.com/v1/api' }}
          OPHIM_START_PAGE: ${{ inputs.start_page != '0' && inputs.start_page || env.OPHIM_START_PAGE || vars.OPHIM_START_PAGE || '1' }}
          OPHIM_END_PAGE: ${{ inputs.end_page != '0' && inputs.end_page || env.OPHIM_END_PAGE || vars.OPHIM_END_PAGE || '0' }}
          OPHIM_FETCH_TIMEOUT_MS: ${{ vars.OPHIM_FETCH_TIMEOUT_MS || '25000' }}
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          SUPABASE_ADMIN_URL: ${{ secrets.SUPABASE_ADMIN_URL }}
          SUPABASE_ADMIN_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_ADMIN_SERVICE_ROLE_KEY }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}

      - name: Upload movie images to R2 (after TMDB build)
        if: ${{ inputs.upload_images == 'true' }}
        run: |
          node scripts/upload-movie-images-r2.js \
            --reupload_existing "${{ inputs.reupload_existing }}"
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}
          R2_REUPLOAD_EXISTING: ${{ inputs.reupload_existing }}

      - name: Commit & push TMDB
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add public/data public/the-loai public/quoc-gia public/nam-phat-hanh public/sitemap.xml public/_redirects public/_routes.json
          find public -type f -name '*.html' -print0 | xargs -0 -r git add --
          git status
          git diff --staged --quiet || (git commit -m "chore: tmdb build (tmdb only)" && git push)

      - name: Deploy TMDB to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: '4.77.0'
          command: pages deploy public --project-name=${{ vars.CLOUDFLARE_PAGES_PROJECT_NAME || 'daop' }} --commit-dirty=true

      - name: Export batches → Supabase (movies + movie_episodes)
        if: ${{ always() && !cancelled() }}
        env:
          SUPABASE_ADMIN_URL: ${{ secrets.SUPABASE_ADMIN_URL }}
          SUPABASE_ADMIN_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_ADMIN_SERVICE_ROLE_KEY }}
          EXPORT_TO_SUPABASE_SCOPE: ${{ vars.EXPORT_TO_SUPABASE_SCOPE || 'all' }}
          SKIP_EXPORT_TO_SUPABASE: ${{ vars.SKIP_EXPORT_TO_SUPABASE }}
        run: |
          set -e
          if [ ! -f public/data/batches/batch-windows.json ]; then
            echo "::warning::Thiếu batch-windows.json — bỏ qua export."
            exit 0
          fi
          if [ "${SKIP_EXPORT_TO_SUPABASE}" = "1" ]; then
            echo "::notice title=Export Supabase::Bỏ qua: Repository Variable SKIP_EXPORT_TO_SUPABASE=1"
            exit 0
          fi
          if [ -z "${SUPABASE_ADMIN_URL}" ] || [ -z "${SUPABASE_ADMIN_SERVICE_ROLE_KEY}" ]; then
            echo "::error::Thiếu secrets SUPABASE_ADMIN_URL hoặc SUPABASE_ADMIN_SERVICE_ROLE_KEY."
            exit 1
          fi
          npm run check-public
          echo "::notice title=Export Supabase::Chạy npm run export-to-supabase (EXPORT_TO_SUPABASE_SCOPE=${EXPORT_TO_SUPABASE_SCOPE})"
          npm run export-to-supabase
