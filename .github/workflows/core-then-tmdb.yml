name: Core then TMDB (2-phase deploy)
on:
  workflow_dispatch:
    inputs:
      start_page:
        description: 'Trang bắt đầu (OPhim), 0 = mặc định'
        required: false
        default: '0'
      end_page:
        description: 'Trang kết thúc (OPhim), 0 = không giới hạn'
        required: false
        default: '0'
      clean:
        description: 'Xóa dữ liệu cũ trước khi build core (true/false)'
        required: false
        default: 'false'
      upload_images:
        description: 'Upload thumb/poster lên repo ảnh sau build TMDB. false = có thể bật bằng biến repo UPLOAD_IMAGES_AFTER_BUILD=1 hoặc site_settings upload_images_after_build (Supabase)'
        required: false
        default: 'false'
      reupload_existing:
        description: 'Upload lại ảnh đã upload (bỏ qua repo_image_upload_state.json) (true/false)'
        required: false
        default: 'false'

jobs:
  build_deploy:
    runs-on: ubuntu-latest
    env:
      PUBJS_CDN_BASE: ${{ vars.PUBJS_CDN_BASE }}
      PUBJS_PATH_PREFIX: ${{ vars.PUBJS_PATH_PREFIX }}
      # Build ghi pubjs.base vào cdn.json; nếu không đặt vars.PUBJS_CDN_BASE thì suy ra từ secret này
      PUBJS_REPO: ${{ secrets.PUBJS_REPO }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm install

      - name: Flags from IMAGES_REPO secret
        run: |
          if [ -n "${{ secrets.IMAGES_REPO }}" ]; then
            echo "HAS_IMAGES_REPO=true" >> $GITHUB_ENV
            echo "GIT_ADD_PUBLIC_IMAGES=" >> $GITHUB_ENV
            echo "IMAGE_CDN_ONLY=1" >> $GITHUB_ENV
            echo "REPO_IMAGE_REMOTE_HEAD_CHECK=1" >> $GITHUB_ENV
          else
            echo "HAS_IMAGES_REPO=false" >> $GITHUB_ENV
            echo "GIT_ADD_PUBLIC_IMAGES=public/thumbs public/posters" >> $GITHUB_ENV
            echo "IMAGE_CDN_ONLY=0" >> $GITHUB_ENV
            echo "REPO_IMAGE_REMOTE_HEAD_CHECK=0" >> $GITHUB_ENV
          fi
          if [ "${{ vars.DEPLOY_AFTER_IMAGE_UPLOAD }}" = "1" ] || [ "${{ vars.DEPLOY_AFTER_R2_UPLOAD }}" = "1" ]; then
            echo "DEPLOY_AFTER_IMAGE_UPLOAD=1" >> $GITHUB_ENV
          else
            echo "DEPLOY_AFTER_IMAGE_UPLOAD=0" >> $GITHUB_ENV
          fi
          if [ -n "${{ secrets.PUBJS_REPO }}" ]; then
            echo "HAS_PUBJS_REPO=true" >> $GITHUB_ENV
          else
            echo "HAS_PUBJS_REPO=false" >> $GITHUB_ENV
          fi

      - name: Load OPhim env from Supabase (auto settings)
        run: node scripts/load-ophim-env-from-supabase.js
        env:
          SUPABASE_ADMIN_URL: ${{ secrets.SUPABASE_ADMIN_URL }}
          SUPABASE_ADMIN_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_ADMIN_SERVICE_ROLE_KEY }}

      - name: Decide upload images mode
        run: |
          if [ "${{ inputs.upload_images }}" = "true" ]; then
            echo "UPLOAD_IMAGES=true" >> $GITHUB_ENV
            echo "::notice::Upload ảnh: bật (workflow input upload_images=true)"
          elif [ "${UPLOAD_IMAGES_AFTER_BUILD:-0}" = "1" ]; then
            echo "UPLOAD_IMAGES=true" >> $GITHUB_ENV
            echo "::notice::Upload ảnh: bật (site_settings upload_images_after_build qua Supabase → UPLOAD_IMAGES_AFTER_BUILD)"
          elif [ "${{ vars.UPLOAD_IMAGES_AFTER_BUILD }}" = "1" ]; then
            echo "UPLOAD_IMAGES=true" >> $GITHUB_ENV
            echo "::notice::Upload ảnh: bật (repository variable UPLOAD_IMAGES_AFTER_BUILD=1)"
          else
            echo "UPLOAD_IMAGES=false" >> $GITHUB_ENV
            echo "::notice::Upload ảnh: tắt — chọn upload_images=true khi chạy workflow, hoặc đặt UPLOAD_IMAGES_AFTER_BUILD=1 (vars/Supabase), và cần secret IMAGES_REPO + IMAGE_CDN_BASE + IMAGES_TOKEN"
          fi

      - name: Build CORE (skip TMDB)
        run: npm run build
        env:
          CLEAN_OLD_DATA: ${{ inputs.clean == 'true' && '1' || '0' }}
          SKIP_TMDB: '1'
          OPHIM_BASE_URL: ${{ secrets.OPHIM_BASE_URL || 'https://ophim1.com/v1/api' }}
          OPHIM_START_PAGE: ${{ inputs.start_page != '0' && inputs.start_page || env.OPHIM_START_PAGE || vars.OPHIM_START_PAGE || '1' }}
          OPHIM_END_PAGE: ${{ inputs.end_page != '0' && inputs.end_page || env.OPHIM_END_PAGE || vars.OPHIM_END_PAGE || '0' }}
          OPHIM_FETCH_TIMEOUT_MS: ${{ vars.OPHIM_FETCH_TIMEOUT_MS || '25000' }}
          OPHIM_DETAIL_CONCURRENCY: ${{ vars.OPHIM_DETAIL_CONCURRENCY || '4' }}
          OPHIM_DETAIL_DELAY_MS: ${{ vars.OPHIM_DETAIL_DELAY_MS || '50' }}
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          SUPABASE_ADMIN_URL: ${{ secrets.SUPABASE_ADMIN_URL }}
          SUPABASE_ADMIN_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_ADMIN_SERVICE_ROLE_KEY }}
          SUPABASE_MOVIES_URL: ${{ secrets.SUPABASE_MOVIES_URL }}
          SUPABASE_MOVIES_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_MOVIES_SERVICE_ROLE_KEY }}
          SUPABASE_EPISODES_URL: ${{ secrets.SUPABASE_EPISODES_URL }}
          SUPABASE_EPISODES_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_EPISODES_SERVICE_ROLE_KEY }}
          IMAGE_CDN_BASE: ${{ secrets.IMAGE_CDN_BASE }}
          IMAGE_CDN_ONLY: ${{ env.IMAGE_CDN_ONLY }}

      - name: Commit & push CORE
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add public/data $GIT_ADD_PUBLIC_IMAGES public/the-loai public/quoc-gia public/nam-phat-hanh public/_redirects public/_routes.json
          find public -type f -name '*.html' -print0 | xargs -0 -r git add --
          git status
          bash scripts/git-commit-staged-push-retry.sh "chore: core build (skip tmdb)"

      - name: Deploy CORE to Cloudflare Pages
        if: ${{ env.DEPLOY_AFTER_IMAGE_UPLOAD != '1' || env.UPLOAD_IMAGES != 'true' }}
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: '4.77.0'
          command: pages deploy public --project-name=${{ vars.CLOUDFLARE_PAGES_PROJECT_NAME || 'daop' }} --commit-dirty=true

      - name: Build TMDB ONLY
        run: npm run build
        env:
          CLEAN_OLD_DATA: '0'
          TMDB_ONLY: '1'
          OPHIM_BASE_URL: ${{ secrets.OPHIM_BASE_URL || 'https://ophim1.com/v1/api' }}
          OPHIM_START_PAGE: ${{ inputs.start_page != '0' && inputs.start_page || env.OPHIM_START_PAGE || vars.OPHIM_START_PAGE || '1' }}
          OPHIM_END_PAGE: ${{ inputs.end_page != '0' && inputs.end_page || env.OPHIM_END_PAGE || vars.OPHIM_END_PAGE || '0' }}
          OPHIM_FETCH_TIMEOUT_MS: ${{ vars.OPHIM_FETCH_TIMEOUT_MS || '25000' }}
          OPHIM_DETAIL_CONCURRENCY: ${{ vars.OPHIM_DETAIL_CONCURRENCY || '4' }}
          OPHIM_DETAIL_DELAY_MS: ${{ vars.OPHIM_DETAIL_DELAY_MS || '50' }}
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          SUPABASE_ADMIN_URL: ${{ secrets.SUPABASE_ADMIN_URL }}
          SUPABASE_ADMIN_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_ADMIN_SERVICE_ROLE_KEY }}
          SUPABASE_MOVIES_URL: ${{ secrets.SUPABASE_MOVIES_URL }}
          SUPABASE_MOVIES_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_MOVIES_SERVICE_ROLE_KEY }}
          SUPABASE_EPISODES_URL: ${{ secrets.SUPABASE_EPISODES_URL }}
          SUPABASE_EPISODES_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_EPISODES_SERVICE_ROLE_KEY }}
          IMAGE_CDN_BASE: ${{ secrets.IMAGE_CDN_BASE }}
          IMAGE_CDN_ONLY: ${{ env.IMAGE_CDN_ONLY }}

      - name: Upload movie images to repo (after TMDB build)
        if: ${{ env.UPLOAD_IMAGES == 'true' }}
        run: |
          node scripts/upload-movie-images-repo.js \
            --reupload_existing "${{ inputs.reupload_existing }}"
        env:
          IMAGE_CDN_BASE: ${{ secrets.IMAGE_CDN_BASE }}
          REPO_IMAGE_REUPLOAD_EXISTING: ${{ inputs.reupload_existing }}
          REPO_IMAGE_REMOTE_HEAD_CHECK: ${{ env.REPO_IMAGE_REMOTE_HEAD_CHECK }}
          REPO_IMAGE_STATE_MINIMAL: '1'
          REPO_IMAGE_STATE_PRUNE: '1'
          REPO_IMAGE_STATE_KEEP_FAILED: '0'

      - name: Push movie images to assets GitHub repo (+ refresh URL @commit)
        if: ${{ env.UPLOAD_IMAGES == 'true' && env.HAS_IMAGES_REPO == 'true' }}
        run: node scripts/push-images-to-assets-repo.js
        env:
          IMAGES_REPO: ${{ secrets.IMAGES_REPO }}
          IMAGES_TOKEN: ${{ secrets.IMAGES_TOKEN || secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          IMAGES_BRANCH: ${{ secrets.IMAGES_BRANCH }}
          IMAGE_CDN_BASE: ${{ secrets.IMAGE_CDN_BASE }}

      - name: Push pubjs JSON to pjs102 + refresh ver/cdn (sau TMDB)
        if: ${{ env.HAS_PUBJS_REPO == 'true' }}
        run: npm run push-pubjs-repo
        env:
          PUBJS_REPO: ${{ secrets.PUBJS_REPO }}
          PUBJS_BRANCH: ${{ vars.PUBJS_BRANCH || 'main' }}
          IMAGES_TOKEN: ${{ secrets.IMAGES_TOKEN || secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      - name: Commit & push TMDB
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add public/data $GIT_ADD_PUBLIC_IMAGES public/the-loai public/quoc-gia public/nam-phat-hanh public/sitemap.xml public/_redirects public/_routes.json
          find public -type f -name '*.html' -print0 | xargs -0 -r git add --
          git status
          bash scripts/git-commit-staged-push-retry.sh "chore: tmdb build (tmdb only)"

      - name: Deploy TMDB to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: '4.77.0'
          command: pages deploy public --project-name=${{ vars.CLOUDFLARE_PAGES_PROJECT_NAME || 'daop' }} --commit-dirty=true

      - name: Export movies (pubjs manifest) → Supabase (Movies project + Episodes project)
        if: ${{ always() && !cancelled() }}
        env:
          SUPABASE_MOVIES_URL: ${{ secrets.SUPABASE_MOVIES_URL }}
          SUPABASE_MOVIES_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_MOVIES_SERVICE_ROLE_KEY }}
          SUPABASE_EPISODES_URL: ${{ secrets.SUPABASE_EPISODES_URL }}
          SUPABASE_EPISODES_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_EPISODES_SERVICE_ROLE_KEY }}
          EXPORT_TO_SUPABASE_SCOPE: ${{ vars.EXPORT_TO_SUPABASE_SCOPE || 'all' }}
          SKIP_EXPORT_TO_SUPABASE: ${{ vars.SKIP_EXPORT_TO_SUPABASE }}
        run: |
          set -e
          if [ ! -f public/data/movies-manifest.json ]; then
            echo "::warning::Thiếu movies-manifest.json — bỏ qua export."
            exit 0
          fi
          if [ "${SKIP_EXPORT_TO_SUPABASE}" = "1" ]; then
            echo "::notice title=Export Supabase::Bỏ qua: Repository Variable SKIP_EXPORT_TO_SUPABASE=1"
            exit 0
          fi
          if [ -z "${SUPABASE_MOVIES_URL}" ] || [ -z "${SUPABASE_MOVIES_SERVICE_ROLE_KEY}" ] || [ -z "${SUPABASE_EPISODES_URL}" ] || [ -z "${SUPABASE_EPISODES_SERVICE_ROLE_KEY}" ]; then
            echo "::error::Thiếu secrets Movies/Episodes Supabase (URL + SERVICE_ROLE_KEY)."
            exit 1
          fi
          npm run check-public
          echo "::notice title=Export Supabase::Chạy npm run export-to-supabase (EXPORT_TO_SUPABASE_SCOPE=${EXPORT_TO_SUPABASE_SCOPE})"
          npm run export-to-supabase
