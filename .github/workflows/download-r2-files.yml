name: Download R2 Files

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Download mode: prefix | keys"
        required: false
        default: "prefix"
      prefix:
        description: "Prefix (folder) to download, e.g. thumbs/ or posters/"
        required: false
        default: "thumbs/"
      keys:
        description: "Keys list (newline separated) when mode=keys"
        required: false
        default: ""
      limit:
        description: "Limit (0 = no limit)"
        required: false
        default: "0"
      concurrency:
        description: "Concurrency (1-16)"
        required: false
        default: "6"

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download files from R2
        run: |
          node scripts/download-r2-files.js \
            --mode "${{ inputs.mode }}" \
            --prefix "${{ inputs.prefix }}" \
            --keys "${{ inputs.keys }}" \
            --limit "${{ inputs.limit }}" \
            --concurrency "${{ inputs.concurrency }}" \
            --out_dir "tmp/r2_download"
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}

      - name: Zip downloaded files
        run: |
          cd tmp
          zip -r r2_download.zip r2_download

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: r2_download
          path: tmp/r2_download.zip
