name: Export to Supabase
on:
  workflow_dispatch:
  repository_dispatch:
    types: [export-to-supabase]

jobs:
  export:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'repository_dispatch' && 'main' || github.ref }}
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - name: Export batches → Supabase (movies + movie_episodes)
        run: npm run export-to-supabase
        env:
          SUPABASE_ADMIN_URL: ${{ secrets.SUPABASE_ADMIN_URL }}
          SUPABASE_ADMIN_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_ADMIN_SERVICE_ROLE_KEY }}
          EXPORT_TO_SUPABASE_SCOPE: ${{ vars.EXPORT_TO_SUPABASE_SCOPE || 'custom' }}
