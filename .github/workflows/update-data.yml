name: Update data daily
on:
  schedule:
    # GitHub Actions cron dùng UTC (GMT+0). Dưới đây là lịch chạy theo giờ Việt Nam (UTC+7): 00:00, 06:00, 12:00, 18:00
    # 00:00 VN = 17:00 UTC (ngày hôm trước), 06:00 VN = 23:00 UTC (ngày hôm trước), 12:00 VN = 05:00 UTC, 18:00 VN = 11:00 UTC, 23:15 VN = 16:15 UTC
    - cron: '15 19 * * *'
    - cron: '0 17 * * *'
    - cron: '0 23 * * *'
    - cron: '0 5 * * *'
    - cron: '0 11 * * *'
  workflow_dispatch:
    inputs:
      phase:
        description: 'Chế độ chạy: 1 = full (1 pha), 2 = core -> tmdb (2 pha)'
        required: false
        default: '1'
      upload_images:
        description: 'Sau khi build xong thì tải/nén/upload ảnh thumb/poster lên R2 (true/false)'
        required: false
        default: 'false'
      reupload_existing:
        description: 'Upload lại ảnh đã upload (bỏ qua r2_upload_state.json) (true/false)'
        required: false
        default: 'false'
      start_page:
        description: 'Trang bắt đầu (OPhim), 0 = mặc định'
        required: false
        default: '0'
      end_page:
        description: 'Trang kết thúc (OPhim), 0 = không giới hạn'
        required: false
        default: '0'
      clean:
        description: 'Xóa dữ liệu cũ trước khi build (true/false)'
        required: false
        default: 'false'

concurrency:
  group: update-data-main
  cancel-in-progress: true
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm install
      - name: Load OPhim env from Supabase (auto settings)
        run: node scripts/load-ophim-env-from-supabase.js
        env:
          SUPABASE_ADMIN_URL: ${{ secrets.SUPABASE_ADMIN_URL }}
          SUPABASE_ADMIN_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_ADMIN_SERVICE_ROLE_KEY }}

      - name: Decide phase mode
        run: |
          if [ "${{ inputs.phase }}" = "2" ]; then
            echo "TWO_PHASE=true" >> $GITHUB_ENV
          elif [ "${UPDATE_DATA_TWO_PHASE}" = "1" ]; then
            echo "TWO_PHASE=true" >> $GITHUB_ENV
          else
            echo "TWO_PHASE=false" >> $GITHUB_ENV
          fi

      - name: Decide upload images mode
        run: |
          if [ "${{ inputs.upload_images }}" = "true" ]; then
            echo "UPLOAD_IMAGES=true" >> $GITHUB_ENV
          elif [ "${UPLOAD_IMAGES_AFTER_BUILD}" = "1" ]; then
            echo "UPLOAD_IMAGES=true" >> $GITHUB_ENV
          else
            echo "UPLOAD_IMAGES=false" >> $GITHUB_ENV
          fi

      - name: Build (1-phase full)
        if: ${{ env.TWO_PHASE != 'true' }}
        run: npm run build
        env:
          CLEAN_OLD_DATA: ${{ inputs.clean == 'true' && '1' || '0' }}
          OPHIM_BASE_URL: ${{ secrets.OPHIM_BASE_URL || 'https://ophim1.com/v1/api' }}
          OPHIM_START_PAGE: ${{ inputs.start_page != '0' && inputs.start_page || env.OPHIM_START_PAGE || vars.OPHIM_START_PAGE || '1' }}
          OPHIM_END_PAGE: ${{ inputs.end_page != '0' && inputs.end_page || env.OPHIM_END_PAGE || vars.OPHIM_END_PAGE || '0' }}
          OPHIM_FETCH_TIMEOUT_MS: ${{ vars.OPHIM_FETCH_TIMEOUT_MS || '25000' }}
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          GOOGLE_SHEETS_ID: ${{ secrets.GOOGLE_SHEETS_ID }}
          GOOGLE_SHEETS_JSON: ${{ secrets.GOOGLE_SHEETS_JSON }}
          SUPABASE_ADMIN_URL: ${{ secrets.SUPABASE_ADMIN_URL }}
          SUPABASE_ADMIN_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_ADMIN_SERVICE_ROLE_KEY }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}

      - name: Upload movie images to R2 (after 1-phase build)
        if: ${{ env.TWO_PHASE != 'true' && env.UPLOAD_IMAGES == 'true' }}
        run: |
          node scripts/upload-movie-images-r2.js \
            --reupload_existing "${{ inputs.reupload_existing }}"
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}
          R2_REUPLOAD_EXISTING: ${{ inputs.reupload_existing }}

      - name: Commit and push (1-phase)
        if: ${{ env.TWO_PHASE != 'true' }}
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add public/data public/the-loai public/quoc-gia public/nam-phat-hanh public/sitemap.xml public/_redirects public/_routes.json
          git status
          if ! git diff --staged --quiet; then
            # Commit trước để tránh lỗi "cannot pull with rebase: Your index contains uncommitted changes"
            git commit -m "chore: update data"
            # Stash để pull an toàn, sau đó unstash
            STASH_BEFORE=$(git stash list | wc -l)
            git stash push -m "temp" || true
            git pull --rebase origin main
            STASH_AFTER=$(git stash list | wc -l)
            if [ "$STASH_AFTER" -gt "$STASH_BEFORE" ]; then
              git stash pop
            fi
            # Commit lại nếu có conflicts resolved
            git push
          fi

      - name: Build CORE (2-phase, skip TMDB)
        if: ${{ env.TWO_PHASE == 'true' }}
        run: npm run build
        env:
          CLEAN_OLD_DATA: ${{ inputs.clean == 'true' && '1' || '0' }}
          SKIP_TMDB: '1'
          OPHIM_BASE_URL: ${{ secrets.OPHIM_BASE_URL || 'https://ophim1.com/v1/api' }}
          OPHIM_START_PAGE: ${{ inputs.start_page != '0' && inputs.start_page || env.OPHIM_START_PAGE || vars.OPHIM_START_PAGE || '1' }}
          OPHIM_END_PAGE: ${{ inputs.end_page != '0' && inputs.end_page || env.OPHIM_END_PAGE || vars.OPHIM_END_PAGE || '0' }}
          OPHIM_FETCH_TIMEOUT_MS: ${{ vars.OPHIM_FETCH_TIMEOUT_MS || '25000' }}
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          GOOGLE_SHEETS_ID: ${{ secrets.GOOGLE_SHEETS_ID }}
          GOOGLE_SHEETS_JSON: ${{ secrets.GOOGLE_SHEETS_JSON }}
          SUPABASE_ADMIN_URL: ${{ secrets.SUPABASE_ADMIN_URL }}
          SUPABASE_ADMIN_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_ADMIN_SERVICE_ROLE_KEY }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}

      - name: Upload CORE public data artifact (2-phase)
        if: ${{ env.TWO_PHASE == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: public-data-core
          path: public/data
          if-no-files-found: error

      - name: Commit & push CORE (2-phase)
        if: ${{ env.TWO_PHASE == 'true' }}
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add public/data public/the-loai public/quoc-gia public/nam-phat-hanh public/sitemap.xml public/_redirects public/_routes.json
          git status
          if ! git diff --staged --quiet; then
            git commit -m "chore: update data (core)"
            STASH_BEFORE=$(git stash list | wc -l)
            git stash push -m "temp" || true
            for i in 1 2 3; do
              git pull --rebase origin main || true
              STASH_AFTER=$(git stash list | wc -l)
              if [ "$STASH_AFTER" -gt "$STASH_BEFORE" ]; then
                git stash pop || true
              fi
              if git push; then
                break
              fi
              if [ "$i" -eq 3 ]; then
                exit 1
              fi
              sleep 2
            done
          fi

      - name: Deploy CORE to Cloudflare Pages (2-phase)
        if: ${{ env.TWO_PHASE == 'true' && env.DEPLOY_AFTER_R2_UPLOAD != '1' }}
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: '4.77.0'
          command: pages deploy public --project-name=${{ vars.CLOUDFLARE_PAGES_PROJECT_NAME || 'daop' }} --commit-dirty=true

      - name: Clean public/data before restoring CORE artifact (2-phase)
        if: ${{ env.TWO_PHASE == 'true' }}
        run: |
          rm -rf public/data
          mkdir -p public/data

      - name: Restore CORE public data before TMDB_ONLY (2-phase)
        if: ${{ env.TWO_PHASE == 'true' }}
        uses: actions/download-artifact@v4
        with:
          name: public-data-core
          path: public/data

      - name: Build TMDB ONLY (2-phase)
        if: ${{ env.TWO_PHASE == 'true' }}
        run: npm run build
        env:
          CLEAN_OLD_DATA: '0'
          TMDB_ONLY: '1'
          OPHIM_BASE_URL: ${{ secrets.OPHIM_BASE_URL || 'https://ophim1.com/v1/api' }}
          OPHIM_START_PAGE: ${{ inputs.start_page != '0' && inputs.start_page || env.OPHIM_START_PAGE || vars.OPHIM_START_PAGE || '1' }}
          OPHIM_END_PAGE: ${{ inputs.end_page != '0' && inputs.end_page || env.OPHIM_END_PAGE || vars.OPHIM_END_PAGE || '0' }}
          OPHIM_FETCH_TIMEOUT_MS: ${{ vars.OPHIM_FETCH_TIMEOUT_MS || '25000' }}
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          GOOGLE_SHEETS_ID: ${{ secrets.GOOGLE_SHEETS_ID }}
          GOOGLE_SHEETS_JSON: ${{ secrets.GOOGLE_SHEETS_JSON }}
          SUPABASE_ADMIN_URL: ${{ secrets.SUPABASE_ADMIN_URL }}
          SUPABASE_ADMIN_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_ADMIN_SERVICE_ROLE_KEY }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}

      - name: Upload movie images to R2 (after 2-phase TMDB build)
        if: ${{ env.TWO_PHASE == 'true' && env.UPLOAD_IMAGES == 'true' }}
        run: |
          node scripts/upload-movie-images-r2.js \
            --reupload_existing "${{ inputs.reupload_existing }}"
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}
          R2_REUPLOAD_EXISTING: ${{ inputs.reupload_existing }}

      - name: Commit & push TMDB ONLY (2-phase)
        if: ${{ env.TWO_PHASE == 'true' }}
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add public/data public/the-loai public/quoc-gia public/nam-phat-hanh public/sitemap.xml public/_redirects public/_routes.json
          git status
          if ! git diff --staged --quiet; then
            git commit -m "chore: update data (tmdb only)"
            STASH_BEFORE=$(git stash list | wc -l)
            git stash push -m "temp" || true
            for i in 1 2 3; do
              git pull --rebase origin main || true
              STASH_AFTER=$(git stash list | wc -l)
              if [ "$STASH_AFTER" -gt "$STASH_BEFORE" ]; then
                git stash pop || true
              fi
              if git push; then
                break
              fi
              if [ "$i" -eq 3 ]; then
                exit 1
              fi
              sleep 2
            done
          fi

      - name: Deploy TMDB to Cloudflare Pages (2-phase)
        if: ${{ env.TWO_PHASE == 'true' }}
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: '4.77.0'
          command: pages deploy public --project-name=${{ vars.CLOUDFLARE_PAGES_PROJECT_NAME || 'daop' }} --commit-dirty=true

      - name: Export to Google Sheets (after 2-phase deploy)
        if: ${{ env.TWO_PHASE == 'true' }}
        run: node scripts/export-to-sheets.js
        env:
          GOOGLE_SHEETS_ID: ${{ secrets.GOOGLE_SHEETS_ID }}
          GOOGLE_SHEETS_JSON: ${{ secrets.GOOGLE_SHEETS_JSON }}
