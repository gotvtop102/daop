name: Update data daily
on:
  schedule:
    # GitHub Actions cron dùng UTC (GMT+0). Dưới đây là lịch chạy theo giờ Việt Nam (UTC+7): 00:00, 06:00, 12:00, 18:00
    # 00:00 VN = 17:00 UTC (ngày hôm trước), 06:00 VN = 23:00 UTC (ngày hôm trước), 12:00 VN = 05:00 UTC, 18:00 VN = 11:00 UTC, 23:15 VN = 16:15 UTC
    - cron: '0 17 * * *'
    - cron: '0 23 * * *'
    - cron: '0 5 * * *'
    - cron: '0 11 * * *'
  workflow_dispatch:
    inputs:
      phase:
        description: 'Chế độ chạy: 1 = full (1 pha), 2 = core -> tmdb (2 pha)'
        required: false
        default: '1'
      upload_images:
        description: 'Sau khi build xong thì tải/nén/ghi ảnh thumb/poster vào repo (public/) (true/false)'
        required: false
        default: 'false'
      reupload_existing:
        description: 'Upload lại ảnh đã upload (bỏ qua repo_image_upload_state.json) (true/false)'
        required: false
        default: 'false'
      start_page:
        description: 'Trang bắt đầu (OPhim), 0 = mặc định'
        required: false
        default: '0'
      end_page:
        description: 'Trang kết thúc (OPhim), 0 = không giới hạn'
        required: false
        default: '0'
      clean:
        description: 'Xóa dữ liệu cũ trước khi build (true/false)'
        required: false
        default: 'false'

concurrency:
  group: update-data-main
  cancel-in-progress: true
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm install

      - name: Flags from IMAGES_REPO secret
        run: |
          if [ -n "${{ secrets.IMAGES_REPO }}" ]; then
            echo "HAS_IMAGES_REPO=true" >> $GITHUB_ENV
            echo "GIT_ADD_PUBLIC_IMAGES=" >> $GITHUB_ENV
            echo "IMAGE_CDN_ONLY=1" >> $GITHUB_ENV
            echo "REPO_IMAGE_REMOTE_HEAD_CHECK=1" >> $GITHUB_ENV
          else
            echo "HAS_IMAGES_REPO=false" >> $GITHUB_ENV
            echo "GIT_ADD_PUBLIC_IMAGES=public/thumbs public/posters" >> $GITHUB_ENV
            echo "IMAGE_CDN_ONLY=0" >> $GITHUB_ENV
            echo "REPO_IMAGE_REMOTE_HEAD_CHECK=0" >> $GITHUB_ENV
          fi

      - name: Load OPhim env from Supabase (auto settings)
        run: node scripts/load-ophim-env-from-supabase.js
        env:
          SUPABASE_ADMIN_URL: ${{ secrets.SUPABASE_ADMIN_URL }}
          SUPABASE_ADMIN_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_ADMIN_SERVICE_ROLE_KEY }}

      - name: Decide phase mode
        run: |
          if [ "${{ inputs.phase }}" = "2" ]; then
            echo "TWO_PHASE=true" >> $GITHUB_ENV
          elif [ "${{ vars.UPDATE_DATA_TWO_PHASE }}" = "1" ]; then
            echo "TWO_PHASE=true" >> $GITHUB_ENV
          else
            echo "TWO_PHASE=false" >> $GITHUB_ENV
          fi

      - name: Decide upload images mode
        run: |
          if [ "${{ inputs.upload_images }}" = "true" ]; then
            echo "UPLOAD_IMAGES=true" >> $GITHUB_ENV
          elif [ "${{ vars.UPLOAD_IMAGES_AFTER_BUILD }}" = "1" ]; then
            echo "UPLOAD_IMAGES=true" >> $GITHUB_ENV
          else
            echo "UPLOAD_IMAGES=false" >> $GITHUB_ENV
          fi

      - name: Export / deploy flags (repository variables → env)
        run: |
          # DEPLOY_AFTER_IMAGE_UPLOAD thay cho tên cũ DEPLOY_AFTER_R2_UPLOAD (cả hai đều được hỗ trợ)
          if [ "${{ vars.DEPLOY_AFTER_IMAGE_UPLOAD }}" = "1" ] || [ "${{ vars.DEPLOY_AFTER_R2_UPLOAD }}" = "1" ]; then
            echo "DEPLOY_AFTER_IMAGE_UPLOAD=1" >> $GITHUB_ENV
          else
            echo "DEPLOY_AFTER_IMAGE_UPLOAD=0" >> $GITHUB_ENV
          fi

      - name: Build (1-phase full)
        id: build_one_phase_full
        if: ${{ env.TWO_PHASE != 'true' }}
        run: |
          npm run build
          echo "HAVE_BATCHES=1" >> $GITHUB_ENV
        env:
          CLEAN_OLD_DATA: ${{ inputs.clean == 'true' && '1' || '0' }}
          OPHIM_BASE_URL: ${{ secrets.OPHIM_BASE_URL || 'https://ophim1.com/v1/api' }}
          OPHIM_START_PAGE: ${{ inputs.start_page != '0' && inputs.start_page || env.OPHIM_START_PAGE || vars.OPHIM_START_PAGE || '1' }}
          OPHIM_END_PAGE: ${{ inputs.end_page != '0' && inputs.end_page || env.OPHIM_END_PAGE || vars.OPHIM_END_PAGE || '0' }}
          OPHIM_FETCH_TIMEOUT_MS: ${{ vars.OPHIM_FETCH_TIMEOUT_MS || '25000' }}
          OPHIM_DETAIL_CONCURRENCY: ${{ vars.OPHIM_DETAIL_CONCURRENCY || '4' }}
          OPHIM_DETAIL_DELAY_MS: ${{ vars.OPHIM_DETAIL_DELAY_MS || '50' }}
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          SUPABASE_ADMIN_URL: ${{ secrets.SUPABASE_ADMIN_URL }}
          SUPABASE_ADMIN_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_ADMIN_SERVICE_ROLE_KEY }}
          IMAGE_CDN_BASE: ${{ secrets.IMAGE_CDN_BASE }}

      - name: Upload movie images to repo (after 1-phase build)
        if: ${{ env.TWO_PHASE != 'true' && env.UPLOAD_IMAGES == 'true' }}
        run: |
          node scripts/upload-movie-images-repo.js \
            --reupload_existing "${{ inputs.reupload_existing }}"
        env:
          IMAGE_CDN_BASE: ${{ secrets.IMAGE_CDN_BASE }}
          REPO_IMAGE_REUPLOAD_EXISTING: ${{ inputs.reupload_existing }}
          REPO_IMAGE_REMOTE_HEAD_CHECK: ${{ env.REPO_IMAGE_REMOTE_HEAD_CHECK }}
          REPO_IMAGE_STATE_MINIMAL: '1'
          REPO_IMAGE_STATE_PRUNE: '1'
          REPO_IMAGE_STATE_KEEP_FAILED: '0'

      - name: Push movie images to assets GitHub repo
        if: ${{ env.TWO_PHASE != 'true' && env.UPLOAD_IMAGES == 'true' && env.HAS_IMAGES_REPO == 'true' }}
        run: node scripts/push-images-to-assets-repo.js
        env:
          IMAGES_REPO: ${{ secrets.IMAGES_REPO }}
          IMAGES_TOKEN: ${{ secrets.IMAGES_TOKEN || secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          IMAGES_BRANCH: ${{ secrets.IMAGES_BRANCH }}

      - name: Commit and push (1-phase)
        if: ${{ env.TWO_PHASE != 'true' }}
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          npm run check-public
          git add public/data $GIT_ADD_PUBLIC_IMAGES public/the-loai public/quoc-gia public/nam-phat-hanh public/sitemap.xml public/_redirects public/_routes.json
          # HTML (chu-de/, index.html, …) có ?v= sau injectFiltersJsCacheBustIntoHtml — phải commit cùng filters.js
          find public -type f -name '*.html' -print0 | xargs -0 -r git add --
          git status
          GIT_COMMIT_PUSH_RETRY_CHECK_PUBLIC=1 bash scripts/git-commit-staged-push-retry.sh "chore: update data"

      - name: Build CORE (2-phase, skip TMDB)
        if: ${{ env.TWO_PHASE == 'true' }}
        run: npm run build
        env:
          CLEAN_OLD_DATA: ${{ inputs.clean == 'true' && '1' || '0' }}
          SKIP_TMDB: '1'
          OPHIM_BASE_URL: ${{ secrets.OPHIM_BASE_URL || 'https://ophim1.com/v1/api' }}
          OPHIM_START_PAGE: ${{ inputs.start_page != '0' && inputs.start_page || env.OPHIM_START_PAGE || vars.OPHIM_START_PAGE || '1' }}
          OPHIM_END_PAGE: ${{ inputs.end_page != '0' && inputs.end_page || env.OPHIM_END_PAGE || vars.OPHIM_END_PAGE || '0' }}
          OPHIM_FETCH_TIMEOUT_MS: ${{ vars.OPHIM_FETCH_TIMEOUT_MS || '25000' }}
          OPHIM_DETAIL_CONCURRENCY: ${{ vars.OPHIM_DETAIL_CONCURRENCY || '4' }}
          OPHIM_DETAIL_DELAY_MS: ${{ vars.OPHIM_DETAIL_DELAY_MS || '50' }}
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          SUPABASE_ADMIN_URL: ${{ secrets.SUPABASE_ADMIN_URL }}
          SUPABASE_ADMIN_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_ADMIN_SERVICE_ROLE_KEY }}
          IMAGE_CDN_BASE: ${{ secrets.IMAGE_CDN_BASE }}

      - name: Upload CORE public data artifact (2-phase)
        if: ${{ env.TWO_PHASE == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: public-data-core
          path: public/data
          if-no-files-found: error

      - name: Commit & push CORE (2-phase)
        if: ${{ env.TWO_PHASE == 'true' }}
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          npm run check-public
          git add public/data $GIT_ADD_PUBLIC_IMAGES public/the-loai public/quoc-gia public/nam-phat-hanh public/sitemap.xml public/_redirects public/_routes.json
          find public -type f -name '*.html' -print0 | xargs -0 -r git add --
          git status
          if ! git diff --staged --quiet; then
            GIT_COMMIT_PUSH_RETRY_CHECK_PUBLIC=1 bash scripts/git-commit-staged-push-retry.sh "chore: update data (core)"
          fi

      - name: Deploy CORE to Cloudflare Pages (2-phase)
        if: ${{ env.TWO_PHASE == 'true' && env.DEPLOY_AFTER_IMAGE_UPLOAD != '1' }}
        continue-on-error: true
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: '4.77.0'
          command: pages deploy public --project-name=${{ vars.CLOUDFLARE_PAGES_PROJECT_NAME || 'daop' }} --commit-dirty=true

      - name: Clean public/data before restoring CORE artifact (2-phase)
        if: ${{ env.TWO_PHASE == 'true' }}
        run: |
          rm -rf public/data
          mkdir -p public/data

      - name: Restore CORE public data before TMDB_ONLY (2-phase)
        if: ${{ env.TWO_PHASE == 'true' }}
        uses: actions/download-artifact@v4
        with:
          name: public-data-core
          path: public/data

      - name: Build TMDB ONLY (2-phase)
        id: build_two_phase_tmdb
        if: ${{ env.TWO_PHASE == 'true' }}
        run: |
          npm run build
          echo "HAVE_BATCHES=1" >> $GITHUB_ENV
        env:
          CLEAN_OLD_DATA: '0'
          TMDB_ONLY: '1'
          OPHIM_BASE_URL: ${{ secrets.OPHIM_BASE_URL || 'https://ophim1.com/v1/api' }}
          OPHIM_START_PAGE: ${{ inputs.start_page != '0' && inputs.start_page || env.OPHIM_START_PAGE || vars.OPHIM_START_PAGE || '1' }}
          OPHIM_END_PAGE: ${{ inputs.end_page != '0' && inputs.end_page || env.OPHIM_END_PAGE || vars.OPHIM_END_PAGE || '0' }}
          OPHIM_FETCH_TIMEOUT_MS: ${{ vars.OPHIM_FETCH_TIMEOUT_MS || '25000' }}
          OPHIM_DETAIL_CONCURRENCY: ${{ vars.OPHIM_DETAIL_CONCURRENCY || '4' }}
          OPHIM_DETAIL_DELAY_MS: ${{ vars.OPHIM_DETAIL_DELAY_MS || '50' }}
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          SUPABASE_ADMIN_URL: ${{ secrets.SUPABASE_ADMIN_URL }}
          SUPABASE_ADMIN_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_ADMIN_SERVICE_ROLE_KEY }}
          IMAGE_CDN_BASE: ${{ secrets.IMAGE_CDN_BASE }}

      - name: Upload movie images to repo (after 2-phase TMDB build)
        if: ${{ env.TWO_PHASE == 'true' && env.UPLOAD_IMAGES == 'true' }}
        run: |
          node scripts/upload-movie-images-repo.js \
            --reupload_existing "${{ inputs.reupload_existing }}"
        env:
          IMAGE_CDN_BASE: ${{ secrets.IMAGE_CDN_BASE }}
          REPO_IMAGE_REUPLOAD_EXISTING: ${{ inputs.reupload_existing }}
          REPO_IMAGE_REMOTE_HEAD_CHECK: ${{ env.REPO_IMAGE_REMOTE_HEAD_CHECK }}
          REPO_IMAGE_STATE_MINIMAL: '1'
          REPO_IMAGE_STATE_PRUNE: '1'
          REPO_IMAGE_STATE_KEEP_FAILED: '0'

      - name: Push movie images to assets GitHub repo (2-phase)
        if: ${{ env.TWO_PHASE == 'true' && env.UPLOAD_IMAGES == 'true' && env.HAS_IMAGES_REPO == 'true' }}
        run: node scripts/push-images-to-assets-repo.js
        env:
          IMAGES_REPO: ${{ secrets.IMAGES_REPO }}
          IMAGES_TOKEN: ${{ secrets.IMAGES_TOKEN || secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          IMAGES_BRANCH: ${{ secrets.IMAGES_BRANCH }}

      - name: Commit & push TMDB ONLY (2-phase)
        if: ${{ env.TWO_PHASE == 'true' }}
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          npm run check-public
          git add public/data $GIT_ADD_PUBLIC_IMAGES public/the-loai public/quoc-gia public/nam-phat-hanh public/sitemap.xml public/_redirects public/_routes.json
          find public -type f -name '*.html' -print0 | xargs -0 -r git add --
          git status
          if ! git diff --staged --quiet; then
            GIT_COMMIT_PUSH_RETRY_CHECK_PUBLIC=1 bash scripts/git-commit-staged-push-retry.sh "chore: update data (tmdb only)"
          fi

      - name: Deploy TMDB to Cloudflare Pages (2-phase)
        if: ${{ env.TWO_PHASE == 'true' }}
        continue-on-error: true
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: '4.77.0'
          command: pages deploy public --project-name=${{ vars.CLOUDFLARE_PAGES_PROJECT_NAME || 'daop' }} --commit-dirty=true

      # Cùng job + always(): deploy Pages (continue-on-error) làm success() = false nhưng vẫn phải export.
      # HAVE_BATCHES=1 chỉ ghi sau build 1-phase hoặc sau build TMDB (2-phase), không ghi sau CORE (data sẽ bị xóa).
      - name: Export batches → Supabase (movies + movie_episodes)
        if: ${{ always() && !cancelled() && env.HAVE_BATCHES == '1' }}
        env:
          SUPABASE_ADMIN_URL: ${{ secrets.SUPABASE_ADMIN_URL }}
          SUPABASE_ADMIN_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_ADMIN_SERVICE_ROLE_KEY }}
          EXPORT_TO_SUPABASE_SCOPE: ${{ vars.EXPORT_TO_SUPABASE_SCOPE || 'all' }}
          SKIP_EXPORT_TO_SUPABASE: ${{ vars.SKIP_EXPORT_TO_SUPABASE }}
        run: |
          set -e
          if [ ! -f public/data/batches/batch-windows.json ]; then
            echo "::warning::Thiếu batch-windows.json — bỏ qua export."
            exit 0
          fi
          if [ "${SKIP_EXPORT_TO_SUPABASE}" = "1" ]; then
            echo "::notice title=Export Supabase::Bỏ qua: Repository Variable SKIP_EXPORT_TO_SUPABASE=1"
            exit 0
          fi
          if [ -z "${SUPABASE_ADMIN_URL}" ] || [ -z "${SUPABASE_ADMIN_SERVICE_ROLE_KEY}" ]; then
            echo "::error::Thiếu secrets SUPABASE_ADMIN_URL hoặc SUPABASE_ADMIN_SERVICE_ROLE_KEY."
            exit 1
          fi
          npm run check-public
          echo "::notice title=Export Supabase::Chạy npm run export-to-supabase (EXPORT_TO_SUPABASE_SCOPE=${EXPORT_TO_SUPABASE_SCOPE})"
          npm run export-to-supabase

