name: Delete movie images in repo
on:
  workflow_dispatch:
    inputs:
      mode:
        description: "prefix | keys | movie_ids"
        required: false
        default: "prefix"
      prefix:
        description: "Prefix to delete (e.g. thumbs/ posters/ slider/ banners/)"
        required: false
        default: ""
      keys:
        description: "Object keys to delete (newline/comma separated)"
        required: false
        default: ""
      movie_ids:
        description: "Movie IDs to delete from repo_image_upload_state.json (newline/comma separated)"
        required: false
        default: ""
      kind:
        description: "thumb | poster | both"
        required: false
        default: "both"
      dry_run:
        description: "Dry run only (true/false)"
        required: false
        default: "true"
      limit:
        description: "Limit objects deleted (0 = no limit)"
        required: false
        default: "0"
jobs:
  delete:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm install

      - name: Delete images under public/
        run: |
          node scripts/delete-movie-images-repo.js \
            --mode "${{ inputs.mode }}" \
            --prefix "${{ inputs.prefix }}" \
            --keys "${{ inputs.keys }}" \
            --movie_ids "${{ inputs.movie_ids }}" \
            --kind "${{ inputs.kind }}" \
            --dry_run "${{ inputs.dry_run }}" \
            --limit "${{ inputs.limit }}"
        env:
          IMAGES_REPO: ${{ secrets.IMAGES_REPO }}
          IMAGES_TOKEN: ${{ secrets.IMAGES_TOKEN || secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          IMAGES_BRANCH: ${{ secrets.IMAGES_BRANCH }}

      - name: Commit delete state
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add public/data/repo_image_upload_state.json
          bash scripts/git-commit-staged-push-retry.sh "chore: repo image upload state (delete)"
