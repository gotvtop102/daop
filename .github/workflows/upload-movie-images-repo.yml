name: Upload movie images to repo
on:
  workflow_dispatch:
    inputs:
      mode:
        description: "thumb,poster, or thumb or poster"
        required: false
        default: "thumb,poster"
      quality:
        description: "Default quality (1-100)"
        required: false
        default: "70"
      thumb_quality:
        description: "Thumb quality override"
        required: false
        default: ""
      poster_quality:
        description: "Poster quality override"
        required: false
        default: ""
      thumb_width:
        description: "Resize thumb width (0 = no resize)"
        required: false
        default: "238"
      thumb_height:
        description: "Resize thumb height (0 = no resize)"
        required: false
        default: "344"
      poster_width:
        description: "Resize poster width (0 = no resize)"
        required: false
        default: "486"
      poster_height:
        description: "Resize poster height (0 = no resize)"
        required: false
        default: "274"
      limit:
        description: "Limit movies processed (0 = no limit)"
        required: false
        default: "0"
      concurrency:
        description: "Concurrency (1-32)"
        required: false
        default: "6"
      force_slugs:
        description: "Force reupload for these movie slugs (comma/newline separated)"
        required: false
        default: ""
      reupload_existing:
        description: "Reupload even if already uploaded (true/false)"
        required: false
        default: "false"
jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm install

      - name: Flags from IMAGES_REPO secret
        run: |
          if [ -n "${{ secrets.IMAGES_REPO }}" ]; then
            echo "HAS_IMAGES_REPO=true" >> $GITHUB_ENV
            echo "GIT_ADD_PUBLIC_IMAGES=" >> $GITHUB_ENV
          else
            echo "HAS_IMAGES_REPO=false" >> $GITHUB_ENV
            echo "GIT_ADD_PUBLIC_IMAGES=public/thumbs public/posters" >> $GITHUB_ENV
          fi

      - name: Upload images to public/thumbs + public/posters
        run: |
          node scripts/upload-movie-images-repo.js \
            --mode "${{ inputs.mode }}" \
            --quality "${{ inputs.quality }}" \
            --thumb_quality "${{ inputs.thumb_quality }}" \
            --poster_quality "${{ inputs.poster_quality }}" \
            --thumb_width "${{ inputs.thumb_width }}" \
            --thumb_height "${{ inputs.thumb_height }}" \
            --poster_width "${{ inputs.poster_width }}" \
            --poster_height "${{ inputs.poster_height }}" \
            --limit "${{ inputs.limit }}" \
            --concurrency "${{ inputs.concurrency }}" \
            --force_slugs "${{ inputs.force_slugs }}" \
            --reupload_existing "${{ inputs.reupload_existing }}"
        env:
          IMAGE_CDN_BASE: ${{ secrets.IMAGE_CDN_BASE }}
          REPO_IMAGE_REUPLOAD_EXISTING: ${{ inputs.reupload_existing }}

      - name: Push movie images to assets GitHub repo
        if: env.HAS_IMAGES_REPO == 'true'
        run: node scripts/push-images-to-assets-repo.js
        env:
          IMAGES_REPO: ${{ secrets.IMAGES_REPO }}
          IMAGES_TOKEN: ${{ secrets.IMAGES_TOKEN || secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          IMAGES_BRANCH: ${{ secrets.IMAGES_BRANCH }}

      - name: Commit images + state
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add $GIT_ADD_PUBLIC_IMAGES public/data/repo_image_upload_state.json
          git diff --staged --quiet || (git commit -m "chore: movie images + upload state" && git push)
