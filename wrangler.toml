name = "daop"
compatibility_date = "2026-03-29"
pages_build_output_dir = "public"

[[d1_databases]]
binding = "DB"
database_name = "ophimcomment"
database_id = "18c4ed3a-ba65-496a-9400-d01337c6d0e7"

[[kv_namespaces]]
binding = "COMMENT_CACHE"
id = "c5ed3fedc921460f9a407c82739b64e4"

[[kv_namespaces]]
binding = "COMMENT_RATE_LIMIT"
id = "3cf12d0fd4874a1a9682f262fd3edb0d"

[vars]
# Khai báo trên Cloudflare Pages > Settings > Environment variables (không commit secret thật vào Git)
# SUPABASE_JWT_SECRET = ""
# COMMENTS_ADMIN_SECRET — KHÔNG đặt trong [vars] (plaintext). Chỉ thêm qua Secrets (mã hóa) trên Dashboard
# hoặc: npx wrangler pages secret put COMMENTS_ADMIN_SECRET --project-name=<tên-project-Pages>

