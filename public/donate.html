  <script>
    fetch('/data/config/donate.json').then(function(r){ return r.json(); }).then(function(d){
      var target = document.getElementById('donate-target');
      var methods = document.getElementById('donate-methods');
      function escapeHtml(s) {
        return String(s || '')
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }
      function normalizeUrl(u) {
        u = String(u || '').trim();
        if (!u) return '';
        if (/^https?:\/\//i.test(u)) return u;
        return 'https://' + u;
      }
      if (target) {
        var cur = Number(d.current_amount) || 0;
        var goal = Number(d.target_amount) || 0;
        var pct = goal ? Math.min(100, (cur / goal) * 100) : 0;
        target.innerHTML = '<p>Mục tiêu: ' + (goal || 0) + ' ' + (d.target_currency || 'VND') + '</p>' +
          '<p>Đã quyên góp: ' + cur + ' ' + (d.target_currency || 'VND') + '</p>' +
          (goal ? '<div style="background:#30363d;border-radius:8px;height:12px;"><div style="width:' + pct + '%;height:100%;background:#58a6ff;border-radius:8px;"></div></div>' : '');
      }
      var parts = [];

      var methodLabelByType = {
        paypal: 'PayPal',
        btc: 'Bitcoin (BTC)',
        eth: 'Ethereum (ETH)',
        ltc: 'Litecoin (LTC)',
        usdt_trc20: 'USDT (TRC20)',
        usdt_erc20: 'USDT (ERC20)',
        bnb_bep20: 'BNB (BEP20)',
        sol: 'Solana (SOL)',
        custom: 'Custom',
      };

      var rawMethods = Array.isArray(d.methods) ? d.methods.slice() : [];
      if (d.paypal_link) {
        var hasPaypal = rawMethods.some(function(m){ return m && m.type === 'paypal'; });
        if (!hasPaypal) rawMethods.unshift({ type: 'paypal', custom_label: '', url: String(d.paypal_link || ''), note: '' });
      }

      var items = '';
      rawMethods.forEach(function(m){
        if (!m) return;
        var type = typeof m.type === 'string' ? m.type : 'custom';
        var customLabel = m.custom_label || m.label || '';
        var labelText = (type !== 'custom') ? (methodLabelByType[type] || type) : customLabel;
        labelText = escapeHtml(labelText || 'Donate');

        var url = normalizeUrl(m.url);
        var note = escapeHtml(m.note || '');

        if (!url && !note) return;

        var right = '';
        if (url) right = '<a href="' + escapeHtml(url) + '" target="_blank" rel="noopener">' + escapeHtml(url) + '</a>';
        else right = '<span style="color:#8b949e">' + note + '</span>';
        var noteLine = note && url ? '<div style="color:#8b949e;font-size:0.95em;margin-top:2px;">' + note + '</div>' : '';
        items += '<li><div><strong>' + labelText + '</strong>: ' + right + '</div>' + noteLine + '</li>';
      });

      if (items) {
        parts.push(
          '<section style="margin:16px 0;">' +
          '<h3 style="margin:0 0 8px;">Phương thức Donate</h3>' +
          '<ul style="margin:0;padding-left:18px;display:flex;flex-direction:column;gap:8px;">' + items + '</ul>' +
          '</section>'
        );
      }

      if (d.bank_info && d.bank_info.length) {
        var bankItems = '';
        d.bank_info.forEach(function(b){
          if (!b) return;
          bankItems += '<li><strong>' + escapeHtml(b.bank_name || '') + '</strong>: ' +
            escapeHtml(b.account_number || '') + ' - ' + escapeHtml(b.account_name || '') + '</li>';
        });
        if (bankItems) {
          parts.push(
            '<section style="margin:16px 0;">' +
            '<h3 style="margin:0 0 8px;">Chuyển khoản</h3>' +
            '<ul style="margin:0;padding-left:18px;display:flex;flex-direction:column;gap:6px;">' + bankItems + '</ul>' +
            '</section>'
          );
        }
      }

      if (d.crypto_addresses && d.crypto_addresses.length) {
        var cryptoItems = '';
        d.crypto_addresses.forEach(function(c){
          if (!c) return;
          cryptoItems += '<li><strong>' + escapeHtml(c.symbol || '') + '</strong>: <span style="word-break:break-all;">' + escapeHtml(c.address || '') + '</span></li>';
        });
        if (cryptoItems) {
          parts.push(
            '<section style="margin:16px 0;">' +
            '<h3 style="margin:0 0 8px;">Crypto Address</h3>' +
            '<ul style="margin:0;padding-left:18px;display:flex;flex-direction:column;gap:6px;">' + cryptoItems + '</ul>' +
            '</section>'
          );
        }
      }

      if (methods) methods.innerHTML = parts.join('') || '<p>Chưa cấu hình phương thức donate.</p>';
    }).catch(function(){
      document.getElementById('donate-target').innerHTML = '<p>Chưa cấu hình donate.</p>';
      document.getElementById('donate-methods').innerHTML = '';
    });
  </script>
